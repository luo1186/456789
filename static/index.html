<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReconCore · 智能对账系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;--border:#30363d;--border2:#444c56;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;--accent:#3b82f6;--accent2:#1d4ed8;--accent-glow:rgba(59,130,246,.15);--green:#3fb950;--green-bg:rgba(63,185,80,.1);--yellow:#d29922;--yellow-bg:rgba(210,153,34,.1);--red:#f85149;--red-bg:rgba(248,81,73,.1);--gray:#6e7681;--gray-bg:rgba(110,118,129,.1);--radius:8px;--radius2:12px;--shadow:0 8px 24px rgba(0,0,0,.4);--font:'Noto Sans SC',sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(99,102,241,.06) 0%,transparent 50%),var(--bg);position:relative;overflow:hidden}
#loginPage::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:48px 40px;width:400px;max-width:95vw;animation:fadeIn .5s ease;box-shadow:var(--shadow),0 0 0 1px rgba(59,130,246,.1);position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.login-logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.login-logo p{font-size:12px;color:var(--text2);margin-top:4px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:500;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.2)}
.btn-danger:hover{background:rgba(248,81,73,.2)}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:32px;height:32px;padding:0}
.btn-full{width:100%;padding:12px}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:100;gap:12px}
.topbar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.topbar-brand-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#6366f1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.topbar-view{font-size:12px;color:var(--text2);padding:3px 8px;background:var(--bg3);border-radius:5px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.view-toggle{font-size:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.view-toggle:hover{background:var(--bg4);color:var(--text)}
.main{flex:1;padding:24px;max-width:1200px;margin:0 auto;width:100%}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px 20px;animation:fadeIn .3s ease}
.stat-card:hover{border-color:var(--border2)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:24px;font-weight:700;font-family:var(--mono)}
.stat-value.green{color:var(--green)}.stat-value.yellow{color:var(--yellow)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--accent)}
.table-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-title{font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;animation:slideIn .2s ease}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(59,130,246,.03)}
td{padding:12px 16px;font-size:13px;vertical-align:middle}
.empty-row td{text-align:center;color:var(--text3);padding:40px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.status-processing{background:var(--yellow-bg);color:var(--yellow)}
.status-done{background:var(--green-bg);color:var(--green)}
.status-queued{background:var(--gray-bg);color:var(--gray)}
.status-failed{background:var(--red-bg);color:var(--red)}
.status-anomaly{background:var(--red-bg);color:var(--red)}
.action-group{display:flex;gap:6px;flex-wrap:wrap}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:fadeIn .25s ease;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.file-upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg3)}
.file-upload-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.file-upload-zone.uploaded{border-color:var(--green);background:var(--green-bg)}
.file-upload-zone input{display:none}
.upload-icon{font-size:22px;margin-bottom:4px}
.upload-label{font-size:12px;color:var(--text2)}
.upload-label strong{color:var(--accent)}
.upload-file-name{font-size:12px;color:var(--green);font-family:var(--mono);margin-top:4px}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filter-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-family:var(--font);font-size:12px;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--accent)}
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:13px;min-width:240px;max-width:360px;display:flex;align-items:center;gap:10px;animation:slideIn .25s ease;box-shadow:var(--shadow)}
.toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}.toast.info{border-left:3px solid var(--accent)}
.loader{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
.processing-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--yellow);animation:pulse 1.2s ease infinite}
.page-loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);gap:10px}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.main{padding:16px}}
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">⚡</div>
      <h1>ReconCore</h1>
      <p>智能对账系统 · 企业版</p>
    </div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" onkeypress="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="loginBtn">登 录</button>
    <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:16px">企业内部系统 · 请勿外泄账号信息</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">⚡</div>
      ReconCore
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-view" id="topbarView">个人工作台</div>
    <div class="topbar-right">
      <button class="view-toggle" id="switchViewBtn" onclick="switchView()" style="display:none"></button>
      <div class="topbar-user">
        <div class="avatar" id="topbarAvatar">?</div>
        <span id="topbarName"></span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button>
    </div>
  </div>
  <div class="main" id="mainContent">
    <div class="page-loader"><span class="loader"></span> 加载中…</div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════
const API = '';   // 同域部署，空字符串即可；跨域时填 http://your-server

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let token = localStorage.getItem('rc_token') || '';
let currentUser = null;
let currentView = 'staff';
let pollTimer = null;

// ══════════════════════════════════════════════════════
//  HTTP
// ══════════════════════════════════════════════════════
async function req(method, path, body, isFormData) {
  const opts = {
    method,
    headers: token ? { Authorization: 'Bearer ' + token } : {}
  };
  if (body && !isFormData) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (isFormData) {
    opts.body = body;
  }
  const res = await fetch(API + path, opts);
  if (res.status === 401) { doLogout(true); throw new Error('请重新登录'); }
  if (!res.ok) {
    let msg = `请求失败 (${res.status})`;
    try { const d = await res.json(); msg = d.detail || msg; } catch(e){}
    throw new Error(msg);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/json')) return res.json();
  return res;
}

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u || !p) { showToast('请填写用户名和密码', 'error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> 登录中…';
  try {
    const data = await req('POST', '/api/login', { username: u, password: p });
    token = data.token;
    localStorage.setItem('rc_token', token);
    currentUser = data.user;
    startApp();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

async function loadMe() {
  try {
    currentUser = await req('GET', '/api/me');
    return true;
  } catch(e) {
    return false;
  }
}

function doLogout(silent) {
  token = '';
  currentUser = null;
  localStorage.removeItem('rc_token');
  stopPoll();
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  if (!silent) showToast('已退出登录', 'info');
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
async function boot() {
  if (token) {
    const ok = await loadMe();
    if (ok) { startApp(); return; }
  }
  document.getElementById('loginPage').style.display = 'flex';
}

function startApp() {
  currentView = currentUser.role === 'admin' ? 'admin' : 'staff';
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  updateTopbar();
  renderCurrentView();
  startPoll();
  showToast(`欢迎回来，${currentUser.display_name}！`, 'success');
}

function updateTopbar() {
  document.getElementById('topbarName').textContent = currentUser.display_name;
  document.getElementById('topbarAvatar').textContent = currentUser.display_name[0];
  document.getElementById('topbarView').textContent = currentView === 'admin' ? '管理员视图' : '个人工作台';
  const btn = document.getElementById('switchViewBtn');
  if (currentUser.role === 'admin') {
    btn.style.display = 'block';
    btn.textContent = currentView === 'admin' ? '切换至个人视图' : '切换至管理员视图';
  } else {
    btn.style.display = 'none';
  }
}

function switchView() {
  currentView = currentView === 'admin' ? 'staff' : 'admin';
  updateTopbar();
  renderCurrentView();
}

// ══════════════════════════════════════════════════════
//  POLL (every 4s to refresh processing tasks)
// ══════════════════════════════════════════════════════
function startPoll() {
  stopPoll();
  pollTimer = setInterval(async () => {
    const content = document.getElementById('mainContent');
    if (!content) return;
    // 只有页面上有处理中/排队的任务才刷新
    if (!content.querySelector('.status-processing, .status-queued')) return;
    await silentRefresh();
  }, 4000);
}
function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }

async function silentRefresh() {
  try {
    if (currentView === 'admin') await renderAdminDashboard(document.getElementById('mainContent'), true);
    else await renderStaffDashboard(document.getElementById('mainContent'), true);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  ROUTING
// ══════════════════════════════════════════════════════
async function renderCurrentView() {
  const el = document.getElementById('mainContent');
  el.innerHTML = '<div class="page-loader"><span class="loader"></span> 加载中…</div>';
  if (currentView === 'admin') await renderAdminDashboard(el);
  else await renderStaffDashboard(el);
}

// ══════════════════════════════════════════════════════
//  STAFF DASHBOARD
// ══════════════════════════════════════════════════════
async function renderStaffDashboard(container, silent) {
  let tasks;
  try { tasks = await req('GET', '/api/tasks'); }
  catch(e) { if (!silent) showToast(e.message, 'error'); return; }

  const total   = tasks.length;
  const done    = tasks.filter(t => t.status === 'done').length;
  const anomaly = tasks.filter(t => t.status === 'done' && t.result_summary?.anomalies > 0).length;
  const inProg  = tasks.filter(t => t.status === 'processing' || t.status === 'queued').length;

  container.innerHTML = `
    <div class="fade-in">
      <div class="section-header">
        <div class="section-title">📋 我的工作台</div>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">🔼 创建新对账任务</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">总任务</div><div class="stat-value blue">${total}</div></div>
        <div class="stat-card"><div class="stat-label">通过</div><div class="stat-value green">${done - anomaly}</div></div>
        <div class="stat-card"><div class="stat-label">异常</div><div class="stat-value ${anomaly>0?'red':'green'}">${anomaly}</div></div>
        <div class="stat-card"><div class="stat-label">处理中</div><div class="stat-value yellow">${inProg}</div></div>
      </div>
      <div class="table-container">
        <div class="table-header">
          <div class="table-title">📂 我的任务列表</div>
          <span style="font-size:11px;color:var(--text3)">${total} 条记录</span>
        </div>
        <table><thead><tr>
          <th>状态</th><th>任务名称</th><th>创建时间</th><th>完成时间</th><th>操作</th>
        </tr></thead><tbody>${renderTaskRows(tasks, false)}</tbody></table>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════
async function renderAdminDashboard(container, silent) {
  let tasks, stats;
  try {
    [tasks, stats] = await Promise.all([
      req('GET', '/api/tasks'),
      req('GET', '/api/admin/stats')
    ]);
  } catch(e) { if (!silent) showToast(e.message, 'error'); return; }

  container.innerHTML = `
    <div class="fade-in">
      <div class="section-header">
        <div class="section-title">📊 团队对账总览</div>
        <div class="filter-bar">
          <select class="filter-select" id="filterUser" onchange="filterAdmin()">
            <option value="">全部成员</option>
            ${[...new Set(tasks.map(t=>t.user_name))].map(n=>`<option value="${n}">${n}</option>`).join('')}
          </select>
          <select class="filter-select" id="filterStatus" onchange="filterAdmin()">
            <option value="">全部状态</option>
            <option value="done">已完成</option>
            <option value="processing">处理中</option>
            <option value="queued">排队中</option>
            <option value="failed">已失败</option>
          </select>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">今日任务</div><div class="stat-value blue">${stats.today_count}</div></div>
        <div class="stat-card"><div class="stat-label">本月异常率</div><div class="stat-value yellow">${stats.anomaly_rate}%</div></div>
        <div class="stat-card"><div class="stat-label">异常总额</div><div class="stat-value red">¥${(stats.anomaly_amt/1000).toFixed(1)}K</div></div>
        <div class="stat-card"><div class="stat-label">总任务数</div><div class="stat-value">${stats.total_count}</div></div>
      </div>
      <div class="table-container">
        <div class="table-header">
          <div class="table-title">🔍 全部对账任务</div>
          <span style="font-size:11px;color:var(--text3)" id="adminCount">${tasks.length} 条记录</span>
        </div>
        <table><thead><tr>
          <th>创建人</th><th>任务名称</th><th>状态</th><th>异常情况</th><th>创建时间</th><th>操作</th>
        </tr></thead><tbody id="adminBody">${renderAdminRows(tasks)}</tbody></table>
      </div>
    </div>`;
  window._adminTasks = tasks;
}

function filterAdmin() {
  const u = document.getElementById('filterUser')?.value || '';
  const s = document.getElementById('filterStatus')?.value || '';
  let t = window._adminTasks || [];
  if (u) t = t.filter(x => x.user_name === u);
  if (s) t = t.filter(x => x.status === s);
  document.getElementById('adminBody').innerHTML = renderAdminRows(t);
  document.getElementById('adminCount').textContent = `${t.length} 条记录`;
}

function renderAdminRows(tasks) {
  if (!tasks.length) return `<tr class="empty-row"><td colspan="6">暂无匹配任务</td></tr>`;
  return tasks.map(t => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="avatar" style="width:22px;height:22px;font-size:10px">${t.user_name[0]}</div>${t.user_name}</div></td>
      <td style="font-weight:500">${t.name}</td>
      <td>${statusBadge(t)}</td>
      <td>${anomalyCell(t)}</td>
      <td style="color:var(--text2);font-family:var(--mono);font-size:12px">${t.created_at}</td>
      <td><div class="action-group">${actionBtns(t)}</div></td>
    </tr>`).join('');
}

function renderTaskRows(tasks, isAdmin) {
  if (!tasks.length) return `<tr class="empty-row"><td colspan="5">暂无任务，点击右上角创建第一个对账任务</td></tr>`;
  return tasks.map(t => `
    <tr>
      <td>${statusBadge(t)}</td>
      <td style="font-weight:500">${t.name}</td>
      <td style="color:var(--text2);font-family:var(--mono);font-size:12px">${t.created_at}</td>
      <td style="color:var(--text2);font-family:var(--mono);font-size:12px">${t.finished_at || '—'}</td>
      <td><div class="action-group">${actionBtns(t)}</div></td>
    </tr>`).join('');
}

function statusBadge(t) {
  if (t.status === 'done') {
    if (t.result_summary?.anomalies > 0) return `<span class="status-badge status-anomaly">⚠️ 有异常</span>`;
    return `<span class="status-badge status-done">✅ 通过</span>`;
  }
  if (t.status === 'processing') return `<span class="status-badge status-processing"><span class="processing-dot"></span> 处理中</span>`;
  if (t.status === 'queued')     return `<span class="status-badge status-queued">⚪ 排队中</span>`;
  if (t.status === 'failed')     return `<span class="status-badge status-failed">✗ 失败</span>`;
  return t.status;
}

function anomalyCell(t) {
  if (!t.result_summary) return `<span style="color:var(--text3);font-size:12px">—</span>`;
  if (t.result_summary.anomalies > 0)
    return `<span style="color:var(--red);font-size:12px">⚠ ${t.result_summary.anomalies}项 / ¥${(t.result_summary.anomaly_amt||0).toLocaleString()}</span>`;
  return `<span style="color:var(--green);font-size:12px">✓ 全部通过</span>`;
}

function actionBtns(t) {
  let html = '';
  if (t.status === 'done') {
    html += `<button class="btn btn-secondary btn-sm" onclick="viewReport('${t.id}')">📊 报告</button>`;
    if (t.has_result) html += `<button class="btn btn-secondary btn-sm" onclick="downloadResult('${t.id}','${t.name}')">⬇ 下载</button>`;
  }
  if (t.status === 'queued' && t.user_id === currentUser?.id)
    html += `<button class="btn btn-danger btn-sm" onclick="cancelTask('${t.id}')">取消</button>`;
  if (t.status === 'processing')
    html += `<span style="font-size:11px;color:var(--yellow);display:flex;align-items:center;gap:4px"><span class="processing-dot"></span>处理中</span>`;
  if (t.status === 'failed')
    html += `<span style="font-size:11px;color:var(--red)">处理失败</span>`;
  return html;
}

// ══════════════════════════════════════════════════════
//  CREATE TASK
// ══════════════════════════════════════════════════════
function openCreateModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'createModal';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">🔼 创建新对账任务</div>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('createModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">任务名称</label>
          <input class="form-input" id="taskName" placeholder="例如：四月_供应商F对账">
        </div>
        <div style="margin-bottom:8px;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">上传源文件（共3个）</div>
        ${uploadZone('file_po','① 采购订单表','📋','含采购单号、品名、单价','zone1','name1')}
        ${uploadZone('file_recv','② 收货单表','📦','含采购单号、品名、数量','zone2','name2')}
        ${uploadZone('file_stmt','③ 电子对账单','🧾','含采购单号、品名、数量、单价、行金额、单据总额','zone3','name3')}
        <div style="margin-top:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text3)">
          支持格式：.xlsx / .xls / .csv &nbsp;·&nbsp; 列名会自动识别，无需严格对齐
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('createModal')">取消</button>
        <button class="btn btn-primary" onclick="submitTask()" id="submitBtn">提交任务</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal('createModal'); });
}

function uploadZone(inputId, label, icon, hint, zoneId, nameId) {
  return `
  <div style="margin-bottom:12px">
    <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${label} <span style="color:var(--text3)">（${hint}）</span></div>
    <div class="file-upload-zone" id="${zoneId}" onclick="document.getElementById('${inputId}').click()">
      <input type="file" id="${inputId}" accept=".xlsx,.xls,.csv" onchange="onFile(this,'${zoneId}','${nameId}')">
      <div class="upload-icon">${icon}</div>
      <div class="upload-label">点击上传 <strong>xlsx / xls / csv</strong></div>
      <div class="upload-file-name" id="${nameId}"></div>
    </div>
  </div>`;
}

function onFile(input, zoneId, nameId) {
  const f = input.files[0];
  if (!f) return;
  document.getElementById(zoneId).classList.add('uploaded');
  document.getElementById(nameId).textContent = '✓ ' + f.name;
}

async function submitTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) { showToast('请填写任务名称', 'error'); return; }
  const f1 = document.getElementById('file_po').files[0];
  const f2 = document.getElementById('file_recv').files[0];
  const f3 = document.getElementById('file_stmt').files[0];
  if (!f1 || !f2 || !f3) { showToast('请上传全部三个源文件', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> 上传中…';

  try {
    const fd = new FormData();
    fd.append('name', name);
    fd.append('po_file', f1);
    fd.append('recv_file', f2);
    fd.append('stmt_file', f3);
    await req('POST', '/api/tasks', fd, true);
    closeModal('createModal');
    showToast(`任务「${name}」已提交，正在排队处理`, 'success');
    renderCurrentView();
  } catch(e) {
    showToast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '提交任务';
  }
}

async function cancelTask(id) {
  if (!confirm('确认取消此任务？')) return;
  try {
    await req('DELETE', `/api/tasks/${id}`);
    showToast('任务已取消', 'info');
    renderCurrentView();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
//  REPORT MODAL
// ══════════════════════════════════════════════════════
async function viewReport(taskId) {
  let r;
  try { r = await req('GET', `/api/tasks/${taskId}/report`); }
  catch(e) { showToast(e.message, 'error'); return; }
  const task = (window._adminTasks || []).find(t => t.id === taskId) || { name: taskId };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'reportModal';
  overlay.innerHTML = `
    <div class="modal" style="width:620px">
      <div class="modal-header">
        <div class="modal-title">📊 对账报告</div>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('reportModal')">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          <div class="stat-card" style="padding:14px"><div class="stat-label">对账总行数</div><div class="stat-value blue" style="font-size:20px">${r.total||0}</div></div>
          <div class="stat-card" style="padding:14px"><div class="stat-label">通过行数</div><div class="stat-value green" style="font-size:20px">${r.passed||0}</div></div>
          <div class="stat-card" style="padding:14px"><div class="stat-label">异常项数</div><div class="stat-value ${(r.anomalies||0)>0?'red':'green'}" style="font-size:20px">${r.anomalies||0}</div></div>
          <div class="stat-card" style="padding:14px"><div class="stat-label">异常金额</div><div class="stat-value ${(r.anomaly_amt||0)>0?'red':'green'}" style="font-size:20px">¥${(r.anomaly_amt||0).toLocaleString()}</div></div>
        </div>
        ${(r.anomalies||0) === 0
          ? `<div style="text-align:center;padding:24px;background:var(--green-bg);border:1px solid rgba(63,185,80,.2);border-radius:var(--radius2)">
               <div style="font-size:36px;margin-bottom:8px">✅</div>
               <div style="font-size:15px;font-weight:600;color:var(--green)">对账完全通过</div>
               <div style="font-size:12px;color:var(--text2);margin-top:4px">所有明细行均已验证，金额、数量、单价完全一致</div>
             </div>`
          : `<div>
               <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">⚠ 异常明细</div>
               ${(r.details||[]).filter(d=>d.anomaly).map(d=>`
                 <div style="background:var(--red-bg);border:1px solid rgba(248,81,73,.2);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:12px">
                   <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                     <strong style="color:var(--red);font-family:var(--mono)">${d.po_no} · ${d.item}</strong>
                     <span style="color:var(--text3)">${d.check_type}</span>
                   </div>
                   <div style="color:var(--text2)">${d.note}</div>
                 </div>`).join('')}
             </div>`}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('reportModal')">关闭</button>
        <button class="btn btn-primary" onclick="downloadResult('${taskId}','')">⬇ 下载结果文件</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal('reportModal'); });
}

// ══════════════════════════════════════════════════════
//  DOWNLOAD — 真实从后端下载文件
// ══════════════════════════════════════════════════════
async function downloadResult(taskId, taskName) {
  showToast('正在生成结果文件，请稍候…', 'info');
  try {
    const res = await fetch(`${API}/api/tasks/${taskId}/download`, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!res.ok) {
      let msg = '下载失败';
      try { const d = await res.json(); msg = d.detail || msg; } catch(e){}
      throw new Error(msg);
    }
    // 从响应头取文件名
    const cd = res.headers.get('content-disposition') || '';
    let filename = taskName ? `${taskName}_对账结果.xlsx` : '对账结果.xlsx';
    const match = cd.match(/filename\*?=(?:UTF-8'')?["']?([^"';\r\n]+)/i);
    if (match) filename = decodeURIComponent(match[1]);

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    showToast('✅ 文件已下载！异常行已标红，含批注', 'success');
  } catch(e) {
    showToast(e.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function closeModal(id) { const el = document.getElementById(id); if(el) el.remove(); }

function showToast(msg, type='info') {
  const tc = document.getElementById('toastContainer');
  const t  = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${{success:'✓',error:'✗',info:'ℹ'}[type]||''}</span><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(() => { t.style.cssText += 'opacity:0;transform:translateX(20px);transition:all .3s'; setTimeout(()=>t.remove(),300); }, 3500);
}

boot();
</script>
